name: 'Bannerlord Module XML Validator'
description: >
  Validates Bannerlord module XML files against the game's XSD schemas.
  Mirrors TaleWorlds.ObjectSystem.MBObjectManager.LoadXmlWithValidation.
  Emits inline PR annotations for every schema violation.
author: 'DellarteDellaGuerra'

branding:
  icon: 'check-circle'
  color: 'green'

inputs:
  module-path:
    description: >
      Path to the module directory to validate (must contain SubModule.xml).
      Relative to $GITHUB_WORKSPACE (the calling repo root).
    required: true
  bannerlord-version:
    description: >
      Target Bannerlord version. Selects which bundled XSD set to use.
      Accepts 'v1.2', 'v1.3', '1.2', '1.3', or a full patch like 'v1.3.8'
      (the patch component is ignored — only major.minor matters).
      Available: v1.2 (29 schemas), v1.3 (49 schemas).
    required: false
    default: 'v1.3'
  game-type:
    description: >
      Only validate XML nodes whose <IncludedGameTypes> includes this value
      (e.g. Campaign, CampaignStoryMode, CustomGame, EditorGame).
      Leave empty to validate all nodes regardless of game type.
    required: false
    default: ''
  strict:
    description: 'Treat XSD warnings as errors (fail the step on warnings).'
    required: false
    default: 'false'
  validate-mbproj:
    description: 'Also validate ModuleData/project.mbproj for each module.'
    required: false
    default: 'false'
  verbose:
    description: 'Show passing and skipped files in the step log.'
    required: false
    default: 'false'
  bannerlord-xml-expanded-api:
    description: >
      Extend the XSD schemas at validation time to allow the expanded equipment
      API attributes (siege, battle, pool on EquipmentRoster and EquipmentSet)
      that Bannerlord supports but omits from the shipped XSD files.
      Works with any bannerlord-version; no hand-edited schema copies are needed.
    required: false
    default: 'false'

outputs:
  result:
    description: '"pass" if all validated files are valid, "fail" otherwise.'
    value: ${{ steps.validate.outputs.result }}

runs:
  using: 'composite'

  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install lxml
      shell: bash
      run: pip install lxml --quiet

    - name: Resolve XSD directory
      id: xsd
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.bannerlord-version }}
      run: |
        # Strip leading 'v', then take only the major.minor portion.
        # Examples:  v1.3.8 -> 1.3   |   1.2 -> 1.2   |   v1.3 -> 1.3
        VERSION="${INPUT_VERSION#v}"          # strip 'v' prefix
        MAJOR_MINOR="${VERSION%.*}"           # drop patch if present (1.3.8 -> 1.3)
        # If there was no dot-patch, ${VERSION%.*} gives the same string, which is fine.
        # Edge-case: if input is just "1" with no minor, we leave it as-is and let
        # the directory check below produce a helpful error.

        XSD_DIR="${{ github.action_path }}/XmlSchemas/v${MAJOR_MINOR}"

        if [ ! -d "$XSD_DIR" ]; then
          AVAILABLE=$(ls "${{ github.action_path }}/XmlSchemas/" | tr '\n' ' ')
          echo "::error::bannerlord-version '${INPUT_VERSION}' resolved to 'v${MAJOR_MINOR}' but no matching XSD directory was found."
          echo "::error::Available versions: ${AVAILABLE}"
          exit 2
        fi

        XSD_COUNT=$(ls "$XSD_DIR"/*.xsd 2>/dev/null | wc -l)
        echo "xsd_dir=$XSD_DIR" >> "$GITHUB_OUTPUT"
        echo "Bannerlord v${MAJOR_MINOR}: using $XSD_COUNT XSD schemas from $XSD_DIR"

    - name: Validate module XML
      id: validate
      shell: bash
      env:
        INPUT_MODULE_PATH:                ${{ inputs.module-path }}
        INPUT_GAME_TYPE:                  ${{ inputs.game-type }}
        INPUT_STRICT:                     ${{ inputs.strict }}
        INPUT_VALIDATE_MBPROJ:            ${{ inputs.validate-mbproj }}
        INPUT_VERBOSE:                    ${{ inputs.verbose }}
        INPUT_BANNERLORD_XML_EXPANDED_API: ${{ inputs.bannerlord-xml-expanded-api }}
        XSD_DIR:                          ${{ steps.xsd.outputs.xsd_dir }}
      run: |
        EXTRA_ARGS=(--github-annotations)
        [ "$INPUT_STRICT"                   = "true" ] && EXTRA_ARGS+=(--strict)
        [ "$INPUT_VALIDATE_MBPROJ"          = "true" ] && EXTRA_ARGS+=(--mbproj)
        [ "$INPUT_VERBOSE"                  = "true" ] && EXTRA_ARGS+=(--verbose)
        [ "$INPUT_BANNERLORD_XML_EXPANDED_API" = "true" ] && EXTRA_ARGS+=(--bannerlord-xml-expanded-api)
        [ -n "$INPUT_GAME_TYPE" ]                        && EXTRA_ARGS+=(--game-type "$INPUT_GAME_TYPE")

        PYTHONPATH="${{ github.action_path }}" python -m validator \
          --module "$INPUT_MODULE_PATH" \
          --xsd-dir "$XSD_DIR" \
          "${EXTRA_ARGS[@]}"

        EXIT_CODE=$?
        echo "result=$([ $EXIT_CODE -eq 0 ] && echo pass || echo fail)" >> "$GITHUB_OUTPUT"
        exit $EXIT_CODE
